<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device, initial-scale=1.0">
        <title>Date Picker | HTML & CSS</title>
        <link rel="stylesheet" href="style.css"/>
    </head>
    <body>
        <div class="datepicker">
            <div class="datepicker-header">
            <button class="nav-btn" aria-label="Previous Month">&lsaquo;</button>
            <h2 class="month-year">June 2026</h2>
            <button class="nav-btn" aria-label="Next Month">&lsaquo;</button>
            </div>
            <div class="datepicker-grid">
                <div class="Weekdays">
                    <span>Mon</span>
                    <span>Tue</span>
                    <span>Wed</span>
                    <span>Thur</span>
                    <span>Fri</span>
                    <span>Sat</span>
                    <span>Sun</span>
                </div>
                <div class="days">
                    <!-- Week 1, June 1-7 -->

                    <span class="current-month">1</span>
                    <span class="current-month">2</span>
                    <span class="current-month">3</span>
                    <span class="current-month">4</span>
                    <span class="current-month">5</span>
                    <span class="current-month">6</span>
                    <span class="current-month">7</span>
                     <!-- Week 2, 8-14 -->

                    <span class="current-month">8</span>
                    <span class="current-month selected">9</span>
                    <span class="current-month">10</span>
                    <span class="current-month">11</span>
                    <span class="current-month">12</span>
                    <span class="current-month">13</span>
                    <span class="current-month">14</span>
                    <!-- Week 3, 15 - 21 -->
                     <span class="current-month">15</span>
                     <span class="current-month">16</span>
                     <span class="current-month">17</span>
                     <span class="current-month">18</span>
                     <span class="current-month">19</span>
                     <span class="current-month">20</span>
                     <span class="current-month">21</span>
                     <!-- Week 4, 22 - 28 -->   
                    <span class="current-month">22</span>
                    <span class="current-month">23</span>
                    <span class="current-month">24</span>
                    <span class="current-month">25</span>
                    <span class="current-month">26</span>
                    <span class="current-month">27</span>
                    <span class="current-month">28</span>
                      <!-- Week 5, 29-30, July 1-5  -->
                    <span class="current-month">29</span>
                    <span class="current-month">30</span>
                    <span class="next-month">1</span>
                    <span class="next-month">2</span>
                    <span class="next-month">3</span>
                    <span class="next-month">4</span>
                    <span class="next-month">5</span>
                    <!-- Week 6, 6-13 -->
                    <span class="next-month">6</span>
                    <span class="next-month">7</span>
                    <span class="next-month">8</span>
                    <span class="next-month">9</span>
                    <span class="next-month">10</span>
                    <span class="next-month">11</span>
                    <span class="next-month">12</span>
                 </div>
            </div>
        </div>
    </body>
</html>
